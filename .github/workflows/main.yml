- name: Download video (retry up to 5 times)
  id: download
  run: |
    FOLDER="${{ github.event.inputs.output_folder }}"
    mkdir -p "$FOLDER"
    touch marker

    MAX_RETRIES=5
    RETRY_COUNT=0
    SUCCESS=false
    LAST_ERROR=""

    while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
      echo "=== Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES ==="
      
      yt-dlp \
        --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
        --format "${{ github.event.inputs.quality }}" \
        --merge-output-format mp4 \
        --retries 3 \
        --fragment-retries 10 \
        --no-check-certificate \
        --geo-bypass \
        --geo-bypass-country US \
        --socket-timeout 30 \
        --no-color \
        --newline \
        -v \
        --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
        --add-header "Accept-Language:en-US,en;q=0.9" \
        --add-header "Cookie:age_gate_passed=1" \
        --add-header "X-Forwarded-For:1.1.1.1" \
        "${{ github.event.inputs.url }}" 2>&1 | tee download_log.txt && {
          NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit)
          if [ -n "$NEW_FILE" ]; then
            echo "✓ Download succeeded: $NEW_FILE"
            SUCCESS=true
            break
          else
            echo "⚠ Command exited with code 0, but no new file was found. Retrying..."
            LAST_ERROR="No file created despite success code"
          fi
        } || {
          EXIT_CODE=$?
          echo "✗ Download attempt failed with exit code $EXIT_CODE"
          
          if grep -q "HTTP Error 410" download_log.txt; then
            echo "ERROR: Video not found (HTTP 410). Video deleted or unavailable."
            LAST_ERROR="HTTP 410: Gone"
            break
          elif grep -q "HTTP Error 404" download_log.txt; then
            echo "ERROR: URL not found (HTTP 404)."
            LAST_ERROR="HTTP 404: Not Found"
            break
          elif grep -q "HTTP Error 403" download_log.txt; then
            echo "WARNING: Access Forbidden (HTTP 403). Region-blocked or account-restricted."
            LAST_ERROR="HTTP 403: Forbidden"
          elif grep -q "ERROR.*unavailable" download_log.txt; then
            echo "ERROR: Video unavailable - age verification required"
            LAST_ERROR="Age verification required"
            break
          else
            LAST_ERROR="Connection/Unknown error"
          fi
        }
      
      RETRY_COUNT=$((RETRY_COUNT+1))
      
      if [ "$SUCCESS" != true ] && [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
        WAIT_TIME=$((5 * RETRY_COUNT))
        echo "Waiting ${WAIT_TIME} seconds before next attempt..."
        sleep $WAIT_TIME
      fi
    done

    if [ "$SUCCESS" = false ]; then
      echo "❌ All $MAX_RETRIES download attempts failed."
      echo "Last error: $LAST_ERROR"
      exit 1
    fi

    FILENAME=$(basename "$NEW_FILE")
    SIZE_BYTES=$(stat -c %s "$NEW_FILE")
    echo "filename=$FILENAME" >> $GITHUB_OUTPUT
    echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
    echo "✓ Downloaded: $NEW_FILE (${SIZE_BYTES} bytes)"
