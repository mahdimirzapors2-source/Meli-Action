name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update && sudo apt-get install -y bc curl wget

      - name: Fetch free proxy
        id: proxy
        run: |
          echo "🌐 Fetching free proxy list..."
          
          # Try multiple proxy sources
          PROXY_URL=$(curl -s "https://www.proxy-list.download/api/v1/get?type=http" 2>/dev/null | grep -o '"ip":"[^"]*","port":"[^"]*' | head -1 | sed 's/"ip":"\([^"]*\)".*"port":"\([^"]*\)"/\1:\2/' || echo "")
          
          if [ -z "$PROXY_URL" ]; then
            echo "First source failed, trying alternative..."
            PROXY_URL=$(curl -s "https://raw.githubusercontent.com/clarketm/proxy-list/master/proxy-list-raw.txt" 2>/dev/null | head -1 || echo "")
          fi
          
          if [ -z "$PROXY_URL" ]; then
            echo "⚠️  Could not fetch proxy, will proceed without proxy"
            echo "proxy_url=" >> $GITHUB_OUTPUT
          else
            echo "✓ Proxy fetched successfully: $PROXY_URL"
            echo "proxy_url=$PROXY_URL" >> $GITHUB_OUTPUT
          fi

      - name: Validate URL
        run: |
          URL="${{ github.event.inputs.url }}"
          PROXY="${{ steps.proxy.outputs.proxy_url }}"
          
          echo "🔗 Testing URL: $URL"
          if [ -n "$PROXY" ]; then
            echo "Using proxy: $PROXY"
            curl -I -L --max-time 10 --proxy "$PROXY" "$URL" 2>&1 | head -5 || echo "⚠️  URL validation with proxy failed, will retry during download..."
          else
            curl -I -L --max-time 10 "$URL" 2>&1 | head -5 || echo "⚠️  URL validation failed, but continuing..."
          fi

      - name: Download video (retry up to 5 times)
        id: download
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"
          touch marker

          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          LAST_ERROR=""
          PROXY="${{ steps.proxy.outputs.proxy_url }}"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo ""
            echo "=========================================="
            echo "📥 Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
            echo "=========================================="
            
            if [ -n "$PROXY" ]; then
              echo "🔄 Using proxy: $PROXY"
            else
              echo "⚠️  No proxy available, downloading directly"
            fi
            
            # Build yt-dlp command with array
            YT_DLP_CMD=(
              "yt-dlp"
              "--output" "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s"
              "--format" "${{ github.event.inputs.quality }}"
              "--merge-output-format" "mp4"
              "--retries" "3"
              "--fragment-retries" "10"
              "--no-check-certificate"
              "--geo-bypass"
              "--geo-bypass-country" "US"
              "--socket-timeout" "30"
              "--no-color"
              "--ignore-errors"
              "--newline"
              "-v"
            )
            
            # Add proxy if available
            if [ -n "$PROXY" ]; then
              YT_DLP_CMD+=("--proxy" "$PROXY")
            fi
            
            # Add URL
            YT_DLP_CMD+=("${{ github.event.inputs.url }}")
            
            # Execute download
            "${YT_DLP_CMD[@]}" 2>&1 | tee download_log.txt && {
              NEW_FILE=$(find "$FOLDER" -type f -newer marker -print -quit)
              if [ -n "$NEW_FILE" ]; then
                echo "✅ Download succeeded: $NEW_FILE"
                SUCCESS=true
                break
              else
                echo "⚠️  Command succeeded but no new file was found. Retrying..."
                LAST_ERROR="No file created despite success code"
              fi
            } || {
              EXIT_CODE=$?
              echo "❌ Download attempt failed with exit code $EXIT_CODE"
              
              if grep -q "HTTP Error 410" download_log.txt 2>/dev/null; then
                echo "🚫 ERROR: Video not found (HTTP 410). Video deleted or unavailable."
                LAST_ERROR="HTTP 410: Gone"
                break
              elif grep -q "HTTP Error 404" download_log.txt 2>/dev/null; then
                echo "🚫 ERROR: URL not found (HTTP 404)."
                LAST_ERROR="HTTP 404: Not Found"
                break
              elif grep -q "HTTP Error 403" download_log.txt 2>/dev/null; then
                echo "⛔ WARNING: Access Forbidden (HTTP 403). Will try with different proxy..."
                LAST_ERROR="HTTP 403: Forbidden"
              else
                LAST_ERROR="Connection/Unknown error"
              fi
            }
            
            RETRY_COUNT=$((RETRY_COUNT+1))
            
            if [ "$SUCCESS" != true ] && [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              # Try to get new proxy on specific retry attempts
              if grep -q "HTTP Error 403" download_log.txt 2>/dev/null || [ $RETRY_COUNT -eq 2 ] || [ $RETRY_COUNT -eq 4 ]; then
                echo ""
                echo "🔄 Fetching alternative proxy for next attempt..."
                NEW_PROXY=$(curl -s "https://www.proxy-list.download/api/v1/get?type=http" 2>/dev/null | grep -o '"ip":"[^"]*","port":"[^"]*' | tail -n +2 | head -1 | sed 's/"ip":"\([^"]*\)".*"port":"\([^"]*\)"/\1:\2/' || echo "")
                if [ -n "$NEW_PROXY" ]; then
                  PROXY="$NEW_PROXY"
                  echo "✓ New proxy obtained: $PROXY"
                else
                  echo "⚠️  Could not fetch new proxy"
                fi
              fi
              
              WAIT_TIME=$((5 * RETRY_COUNT))
              echo "⏳ Waiting ${WAIT_TIME} seconds before next attempt..."
              sleep $WAIT_TIME
            fi
          done

          echo ""
          echo "=========================================="
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ All $MAX_RETRIES download attempts failed."
            echo "Last error: $LAST_ERROR"
            exit 1
          fi

          FILENAME=$(basename "$NEW_FILE")
          SIZE_BYTES=$(stat -c %s "$NEW_FILE")
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "✅ Downloaded: $NEW_FILE (${SIZE_BYTES} bytes)"
        shell: bash

      - name: Install RAR
        run: sudo apt-get install -y rar

      - name: Conditional split (if file > 99 MB)
        id: split
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          
          if [ -z "$SIZE_BYTES" ]; then
            echo "❌ Error: size_bytes not set"
            exit 1
          fi
          
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=99

          cd "$FOLDER"

          if (( $(echo "$SIZE_MB > $THRESHOLD_MB" | bc -l) )); then
            echo "📦 File size ${SIZE_MB} MB exceeds ${THRESHOLD_MB} MB – splitting into 95 MB RAR parts."
            RANDOM_HEX=$(openssl rand -hex 3)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_HEX}"
            echo "Archive base name: ${ARCHIVE_NAME}"
            
            if rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"; then
              rm "$FILENAME"
              echo "split_done=true" >> $GITHUB_OUTPUT
              echo "✅ Split completed. Parts created:"
              ls -lh "${ARCHIVE_NAME}.part"*.rar
            else
              echo "❌ RAR split failed"
              exit 1
            fi
          else
            echo "✅ File size ${SIZE_MB} MB is ≤${THRESHOLD_MB} MB – keeping original."
            echo "split_done=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate summary
        if: success()
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          echo "📊 Download Summary:"
          du -sh "$FOLDER"
          ls -lh "$FOLDER/"

      - name: Commit and push to repository
        if: success()
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if ! git diff --quiet "$FOLDER/"; then
            git add "$FOLDER/"
            git commit -m "✓ Add downloaded video(s) - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Changes pushed successfully"
          else
            echo "ℹ️  No changes to commit"
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: download-logs
          path: download_log.txt
          retention-days: 7
